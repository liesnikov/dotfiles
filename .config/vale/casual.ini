# vale doesn't expand ~ or $HOME; StylesPath is resolved relative to this
# config's dir (~/.config/vale), so reach $XDG_DATA_HOME via ../../ (no
# hardcoded username -> works for every user of these dotfiles).
StylesPath = ../../.local/share/vale/styles

MinAlertLevel = warning
SkippedScopes = code, script, style, pre

[*]
BasedOnStyles = Vale, AIWriting
