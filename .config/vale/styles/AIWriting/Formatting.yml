# Emoji-as-heading-decoration is a visually obvious AI tell. Scoped to headings only --
# emoji in body prose is too noisy a signal for casual writing.
extends: existence
message: "'%s' -- emoji in a heading reads as an AI-writing/markdown-template tell; use plain text."
link: https://en.wikipedia.org/wiki/Wikipedia:Signs_of_AI_writing
level: suggestion
scope: heading
nonword: true # emoji aren't word chars (see Boilerplate.yml)
tokens:
  - '[✅🚀💡🔥⚡🎯📌✨🌟👉🎉📈🔑💪🙌]'
