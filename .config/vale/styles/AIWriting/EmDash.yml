# LLMs overuse em dashes as an aside-tic. Distinct from Prim.EmDash (spacing) and
# Microsoft.Dashes (dash-as-hyphen) -- both stay enabled alongside this.
extends: occurrence
message: "%d em dashes in one paragraph -- an LLM writing tic; some of these are probably better as separate sentences."
link: https://en.wikipedia.org/wiki/Wikipedia:Signs_of_AI_writing
level: suggestion # frequency nudge; heavy em-dash use can be a legitimate personal style
scope: paragraph
max: 2 # 3+ in one paragraph is the "wall of asides" pattern
token: '[—–]'
